name: Publish

# Tag-driven release to the Chrome Web Store.
#
# Bump "version" in manifest.json, then push a matching tag to fire it:
#   git tag v0.5 && git push origin v0.5   (tag must equal the app's version)
# The job fails fast if the tag doesn't equal v<manifest version> so the store
# version and the git tag can't drift.
#
# Use the "Run workflow" button (workflow_dispatch) to package without publishing —
# handy for grabbing the zip for a first manual upload.
#
# ── Required repository secrets ───────────────────────────────────────────────
#   CWS_CLIENT_ID       OAuth client ID for the Chrome Web Store API
#   CWS_CLIENT_SECRET   OAuth client secret
#   CWS_REFRESH_TOKEN   OAuth refresh token (generated once)
#   CWS_EXTENSION_ID    the extension ID, assigned at the first manual upload
# Guide: https://github.com/fregante/chrome-webstore-upload/blob/main/How%20to%20generate%20Google%20API%20keys.md

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          manifest_version="$(jq -r .version manifest.json)"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "manifest=$manifest_version tag=$tag_version"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME != manifest version $manifest_version"
            exit 1
          fi

      # The extension version must always equal the TubeFold app's MARKETING_VERSION.
      # We read it straight from the public App repo's Xcode project so the two can't
      # drift — a release with a mismatched version fails here instead of shipping.
      - name: Verify version matches the TubeFold app
        run: |
          manifest_version="$(jq -r .version manifest.json)"
          app_version="$(curl -fsSL 'https://raw.githubusercontent.com/TubeFold/App/main/TubeFold%20App/TubeFold.xcodeproj/project.pbxproj' \
            | grep -m1 'MARKETING_VERSION' | sed -E 's/.*MARKETING_VERSION = ([^;]+);.*/\1/' | tr -d ' ')"
          echo "manifest=$manifest_version app=$app_version"
          if [ -z "$app_version" ]; then
            echo "::error::Could not read MARKETING_VERSION from TubeFold/App"
            exit 1
          fi
          if [ "$manifest_version" != "$app_version" ]; then
            echo "::error::Extension version $manifest_version != app MARKETING_VERSION $app_version — they must match. Bump manifest.json to $app_version."
            exit 1
          fi

      - name: Package extension
        run: |
          zip -r -X extension.zip manifest.json icons src
          echo "Packaged:" && unzip -l extension.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

      - name: Publish to Chrome Web Store
        if: startsWith(github.ref, 'refs/tags/')
        run: npx --yes chrome-webstore-upload-cli@3 upload --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          ZIP_FILE: extension.zip
